name: Build Firmware

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install platformio

      - run: pio run

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/default/firmware.bin
